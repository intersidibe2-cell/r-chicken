<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Écran Cuisine - R-CHICKEN</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#111827;color:#fff}</style>
</head>
<body>
<div class="p-4">
<a href="index.html" class="text-yellow-500 hover:underline mb-4 inline-block">← Retour</a>
<h1 class="text-2xl font-black text-yellow-400 mb-4">ÉCRAN CUISINE</h1>
<button onclick="loadOrders()" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">Actualiser</button>
<div id="orders" class="text-center text-gray-400">Chargement...</div>

<script type="module">
const supabaseUrl = 'https://kwotomcxflbykhghxvfy.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3b3RvbWN4ZmxieWtoZ2h4dmZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY1NTcsImV4cCI6MjA5MDA1MjU1N30.gwgAcEn3kDSmv8qN8qDTflq2TaNPF4uIiCxbuj9u1Sc';

async function updateStatus(id, status) {
  await fetch(supabaseUrl + '/rest/v1/commandes?id=eq.' + id, {
    method: 'PATCH',
    headers: { 
      'apikey': supabaseKey, 
      'Authorization': 'Bearer ' + supabaseKey,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ status, updated_at: new Date().toISOString() })
  });
  loadOrders();
}

async function loadOrders() {
  try {
    const res = await fetch(supabaseUrl + '/rest/v1/commandes?select=*&status=eq.en attente&order=created_at.asc', {
      headers: { 'apikey': supabaseKey, 'Authorization': 'Bearer ' + supabaseKey }
    });
    const res2 = await fetch(supabaseUrl + '/rest/v1/commandes?select=*&status=eq.en cours&order=created_at.asc', {
      headers: { 'apikey': supabaseKey, 'Authorization': 'Bearer ' + supabaseKey }
    });
    const data1 = await res.json();
    const data2 = await res2.json();
    const data = [...(Array.isArray(data1) ? data1 : []), ...(Array.isArray(data2) ? data2 : [])];
    
    if (data.length === 0) {
      document.getElementById('orders').innerHTML = '<p class="text-center py-8 text-gray-400">Aucune commande en attente</p>';
    } else {
      document.getElementById('orders').innerHTML = data.map(order => `
        <div class="p-4 rounded-lg mb-3 ${order.status === 'en attente' ? 'bg-yellow-900 border-2 border-yellow-500' : 'bg-blue-900 border-2 border-blue-500'}">
          <div class="flex justify-between items-start mb-2">
            <span class="font-bold text-xl">${order.id}</span>
            <span class="text-xs text-gray-300">${new Date(order.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <p class="font-bold text-lg">${order.client_name}</p>
          <p class="text-sm text-gray-300">${order.client_phone}</p>
          <p class="font-bold text-xl mt-2 text-green-400">${(order.total || 0).toLocaleString()}F</p>
          <button onclick="updateStatus('${order.id}', '${order.status === 'en attente' ? 'en cours' : 'prêt'}')" 
            class="w-full mt-3 py-2 rounded font-bold ${order.status === 'en attente' ? 'bg-yellow-500 text-black' : 'bg-green-500 text-white'}">
            ${order.status === 'en attente' ? 'COMMENCER' : 'PRÊT'}
          </button>
        </div>
      `).join('');
    }
    
    setTimeout(loadOrders, 5000);
  } catch (e) {
    document.getElementById('orders').innerHTML = '<p class="text-red-500">Erreur: ' + e.message + '</p>';
  }
}

loadOrders();
</script>
</div>
</body>
</html>
