<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R-CHICKEN - Hors ligne</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1A1A1A 0%, #2D0A0A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      font-weight: 900;
      color: #E4002B;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #FFB81C;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .message {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .message h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    .message p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      line-height: 1.5;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .phone {
      background: #E4002B;
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .retry {
      background: transparent;
      border: 2px solid #FFB81C;
      color: #FFB81C;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    .retry:hover {
      background: #FFB81C;
      color: #1A1A1A;
    }
    .features {
      margin-top: 32px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .feature {
      text-align: center;
    }
    .feature-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .feature-text {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">R</div>
    <h1>R-CHICKEN</h1>
    <p class="subtitle">Le Poulet Croustillant Malien</p>
    
    <div class="message">
      <div class="icon">📡</div>
      <h2>Vous êtes hors ligne</h2>
      <p>Vérifiez votre connexion internet et réessayez. Vous pouvez aussi nous appeler directement!</p>
    </div>
    
    <a href="tel:+22383806129" class="phone">
      📞 +223 83 80 61 29
    </a>
    
    <br>
    
    <button class="retry" onclick="window.location.reload()">
      🔄 Réessayer
    </button>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🕐</div>
        <div class="feature-text">Ouvert 24h/24</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🛵</div>
        <div class="feature-text">Livraison rapide</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🍗</div>
        <div class="feature-text">Poulet frais</div>
      </div>
    </div>
  </div>
  
  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
